name: Create Android Keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Ustaw Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Wygeneruj keystore i sekrety
        shell: bash
        run: |
          KEYSTORE_PASSWORD="TabliczkaMnozeniaUpload2026"
          KEY_ALIAS="tabliczka_upload"

          keytool -genkeypair \
            -v \
            -keystore upload-keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Tabliczka Mnozenia, OU=Android, O=ExcelAdvicePro, L=Pila, S=Wielkopolskie, C=PL"

          base64 -w 0 upload-keystore.jks > upload-keystore-base64.txt

          {
            echo "ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$KEYSTORE_PASSWORD"
          } > keystore-passwords.txt

      - name: Sprawdź keystore
        shell: bash
        run: |
          keytool -list \
            -keystore upload-keystore.jks \
            -storepass "TabliczkaMnozeniaUpload2026" \
            -alias "tabliczka_upload"

      - name: Zapisz pliki do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-and-secrets
          path: |
            upload-keystore.jks
            upload-keystore-base64.txt
            keystore-passwords.txt
          retention-days: 1
