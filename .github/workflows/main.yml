name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz pliki z repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ustaw Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Ustaw Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Znajdź folder projektu
        shell: bash
        run: |
          PROJECT_FILE=$(find . -name "settings.gradle" -not -path "./.git/*" | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "Nie znaleziono settings.gradle."
            echo "W repozytorium nie ma plików projektu Android."
            echo "Powinny być: settings.gradle, build.gradle, gradle.properties oraz folder app."
            echo ""
            echo "Pliki znalezione w repozytorium:"
            find . -maxdepth 6 -type f -not -path "./.git/*" | sort
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Znaleziono projekt Android w folderze: $PROJECT_DIR"

      - name: Zbuduj APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon

      - name: Skopiuj APK do folderu output
        shell: bash
        run: |
          mkdir -p output
          cp "$PROJECT_DIR"/app/build/outputs/apk/debug/*.apk output/TabliczkaMnozenia-debug.apk

      - name: Zapisz APK do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: TabliczkaMnozenia-debug-apk
          path: output/TabliczkaMnozenia-debug.apk
          if-no-files-found: error
